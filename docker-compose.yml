services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data      
    networks:
      - clinic-network      
  api:
    build:
      context: ./backend
      dockerfile: src/Clinic.API/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=${POSTGRES_HOST}=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    ports:
      - "5000:8080"     
    depends_on:
      - postgres     
    networks:
      - clinic-network

networks:
  clinic-network:
    driver: bridge      
volumes:
  pgdata:    